publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  shared_preferences: ^2.3.2
  mobile_scanner: ^5.2.3
  flutter_secure_storage: ^9.2.2
  flutter_riverpod: ^2.5.3
  go_router: ^14.6.1
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.4+1
  web_socket_channel: ^3.0.1
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
