name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Flutter (Android APK) ──
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android_app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AegisOps-Android-APK
          path: android_app/build/app/outputs/flutter-apk/app-release.apk

  # ── Electron (Windows + Linux) ──
  build-electron:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_name: AegisOps-Windows
            artifact_path: aegisops_app/dist/*.exe
          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_name: AegisOps-Linux
            artifact_path: aegisops_app/dist/*.AppImage

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: aegisops_app

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_REFERENCES: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspace)
        run: npm ci
        working-directory: .

      - name: Run tests
        run: npm test

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build Electron app (Linux)
        if: runner.os == 'Linux'
        run: npm run build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  # ── Python (Backend tests) ──
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio openpyxl httpx

      - name: Run tests
        run: python -m pytest tests/ -v
