name: Tests & Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  node-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aegisops_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aegisops_app/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true
      - name: Test
        run: npm test --if-present
        env:
          CI: true

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx ruff
      - name: Lint (ruff)
        run: ruff check . || true
      - name: Test
        run: pytest tests/ -v --cov=. --cov-report=term --cov-report=xml || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml

  flutter-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.5', channel: 'stable', cache: true }
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze || true
      - name: Test
        run: flutter test
