name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze || true

      - name: Run tests
        run: flutter test || true

      - name: Build APK (release, split-per-abi)
        run: flutter build apk --release --split-per-abi
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Build universal APK
        run: flutter build apk --release
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Rename artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/AegisOps-Mobile-universal.apk || true
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/AegisOps-Mobile-arm64.apk || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/AegisOps-Mobile-armv7.apk || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk dist/AegisOps-Mobile-x86_64.apk || true
          ls -lh dist/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: AegisOps-Android-APK
          path: android_app/dist/*.apk
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android_app/dist/*.apk
          generate_release_notes: true
